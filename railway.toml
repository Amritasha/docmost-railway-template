[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health/live"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[deploy.volumeMounts]]
mountPath = "/app/data/storage"

[variables]
PORT = "3000"
NODE_ENV = "production"
